name: Aegis CD Pipeline

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase IMAGE_NAME
        run: |
          echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}

      - name: Build and push Engine Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./engine
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}-engine:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Ingestor Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./workers/ingestor
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}-ingestor:latest

  deploy-to-hf:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Use the HF_TOKEN to push to the Space remote
          # The remote URL format: https://[USERNAME]:[TOKEN]@huggingface.co/spaces/[USERNAME]/[SPACE_NAME]
          git push --force https://x-token:$HF_TOKEN@huggingface.co/spaces/${{ secrets.HF_USERNAME }}/${{ secrets.HF_SPACE_NAME }} main
